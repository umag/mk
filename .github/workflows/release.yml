# Cut a calendar-versioned release: YYYY.MM.DD.N (N increments per day).
# Runs on every push to main (and on demand): builds & pushes
# umagistr/mk:<calver> + :latest, then creates a GitHub release.
# This is the ONLY image publisher — every release is CalVer, never a SHA tag.
name: Release (CalVer)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # create the tag + GitHub release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need all tags to compute the day's next .N

      - name: Compute CalVer (YYYY.MM.DD.N)
        id: ver
        run: |
          base=$(date -u +'%Y.%m.%d')
          n=$(( $(git tag -l "${base}.*" | wc -l) + 1 ))
          echo "version=${base}.${n}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${base}.${n}"

      # Gate: don't cut a release off a broken tree.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run gate
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - run: deno check server/main.ts

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push (CalVer + latest)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            umagistr/mk:${{ steps.ver.outputs.version }}
            umagistr/mk:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.version }}" \
            --title "${{ steps.ver.outputs.version }}" \
            --generate-notes \
            --target "${{ github.sha }}"
